  infrastructure using Docker, Kubernetes (K8s), Terraform, and Ansible 
  across Amazon Web Services (AWS), Google Cloud Platform (GCP), and 
  Microsoft Azure. Develops full-stack applications with React, Vue.js, 
  TypeScript, Python, Go (Golang), and Java. Designs GPU rendering 
  pipelines with OpenGL, Vulkan API, and GLSL shaders, with demonstrated 
  experience profiling and optimizing graphics performance. Advanced Linux 
  administrator comfortable in terminal-driven workflows. Leverages AI 
  agents (Claude Code, MCP) as a development force multiplier while 
  retaining full ownership of architectural and performance-critical 
  decisions. Effective as both a self-directed individual contributor and 
  a collaborative team member in Agile environments.

